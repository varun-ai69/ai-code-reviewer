server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve pre-compressed assets when available
    gzip_static on;

    # SPA fallback: route all requests to index.html so client-side routing works
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (Vite fingerprints them with content hashes)
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
